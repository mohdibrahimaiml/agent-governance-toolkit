# agt-policies — African Regulatory Pack
# AI Agent Model Routing Controls — Universal Safety Control
#
# Regulatory alignment:
#   OWASP Agentic AI Top 10    — LLM03 (Model Theft) / LLM05 (Supply Chain)
#   NIST AI RMF                — GOVERN 1.1, GOVERN 2.2
#   EU AI Act Art. 9           — risk management for high-risk AI systems
#   CBN Risk-Based Supervision — model risk management requirements
#
# ⚠️  IMPORTANT: This is a community-maintained governance starter policy.
# Approved model lists must be maintained and updated as new models are
# released or deprecated. Verify against your organisation's model
# governance framework before production deployment.
#
# Rego reference implementation: rego/agent-model-routing.rego
# The .rego file is NOT loaded by the Agent-OS Python runtime.

version: "1.0"
name: agent-model-routing
description: >
  Universal agent safety control — prevents sensitive workloads from being
  processed by banned or unapproved AI models. Sensitive task types include
  PII processing, financial decisions, fraud detection, KYC review, and AML
  screening. Deployer-configurable approved model lists and task type
  classifications via Rego data.config.model_routing.*.

metadata:
  source_regulation: "OWASP Agentic AI Top 10 — LLM03/LLM05 (Model Theft / Supply Chain); NIST AI RMF GOVERN 1.1; EU AI Act Art. 9"
  jurisdiction: "universal"
  enforcing_authority: "OWASP Agentic AI Working Group"

rules:

  # =========================================================================
  # OWASP LLM03 — Banned Model Block
  # Deprecated, unverified, or non-compliant models are unconditionally
  # blocked from any task regardless of sensitivity.
  # =========================================================================

  - name: model-routing-banned-model-block
    condition:
      field: context.model
      operator: in
      value: ["gpt-3.5-turbo", "text-davinci-003", "text-curie-001", "text-babbage-001", "text-ada-001"]
    action: deny
    priority: 100
    message: "OWASP LLM03: Banned/deprecated model blocked — use a current approved model"

  # =========================================================================
  # OWASP LLM05 — Sensitive Task: PII / KYC / AML
  # These task types involve customer identity, financial crime detection,
  # or credit assessment. Must use an explicitly approved enterprise model.
  # =========================================================================

  - name: model-routing-sensitive-identity-task
    condition:
      field: context.task_type
      operator: in
      value: ["pii_processing", "kyc_review", "aml_screening", "identity_verification", "fraud_detection"]
    action: block
    priority: 90
    message: "OWASP LLM05: Sensitive identity/compliance task — specify an approved enterprise model in context.model"

  # =========================================================================
  # OWASP LLM05 — Sensitive Task: Financial Decisions
  # Credit scoring, loan approval, and risk assessment affect customers
  # materially. Audit trail required; approved model must be specified.
  # =========================================================================

  - name: model-routing-financial-decision-audit
    condition:
      field: context.task_type
      operator: in
      value: ["financial_decision", "loan_approval", "credit_scoring", "risk_assessment", "investment_advice"]
    action: audit
    priority: 80
    message: "OWASP LLM03: Financial decision task logged — model governance audit trail for CBN/NIST compliance"

  # =========================================================================
  # OWASP LLM05 — High-Stakes Advisory Tasks
  # Medical and legal advice carry professional liability. Escalate to
  # ensure a human reviews the model selection before invocation.
  # =========================================================================

  - name: model-routing-high-stakes-advisory
    condition:
      field: context.task_type
      operator: in
      value: ["medical_advice", "legal_advice", "authentication", "biometric_verification"]
    action: block
    priority: 85
    message: "OWASP LLM05: High-stakes advisory task — requires human review of model selection before execution"

defaults:
  action: allow
  max_tokens: 4096
  max_tool_calls: 10
