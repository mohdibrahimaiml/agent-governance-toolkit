# agt-policies — African Regulatory Pack
# AI Agent Tool Permissions — Universal Safety Control
#
# Regulatory alignment:
#   OWASP Agentic AI Top 10    — LLM08 (Tool Permissions / Excessive Agency)
#   NIST AI RMF                — GOVERN 2.2, MANAGE 1.3
#   EU AI Act Art. 14          — human oversight for high-risk AI
#   CBN Risk-Based Supervision — segregation of duties
#
# ⚠️  IMPORTANT: This is a community-maintained governance starter policy.
# The default restricted tool set covers common dangerous operations.
# Review and extend for your specific agent tooling before production use.
#
# Rego reference implementation: rego/agent-tool-permissions.rego
# The .rego file is NOT loaded by the Agent-OS Python runtime.

version: "1.0"
name: agent-tool-permissions
description: >
  Universal agent safety control — governs which tools an AI agent may invoke.
  Default restricted set covers shell execution, destructive data operations,
  privilege escalation, deployments, and outbound network exfiltration vectors.
  Deployer-configurable allow/deny/restrict lists (OWASP LLM08; NIST AI RMF).

metadata:
  source_regulation: "OWASP Agentic AI Top 10 — LLM08 (Tool Permissions / Excessive Agency); NIST AI RMF GOVERN 2.2"
  jurisdiction: "universal"
  enforcing_authority: "OWASP Agentic AI Working Group"

tool_allowlist: []

rules:

  # =========================================================================
  # OWASP LLM08 — Shell & Code Execution
  # Agents must never invoke shell or code-execution tools without explicit
  # deployer allowlist entry. This is the highest-risk tool category.
  # =========================================================================

  - name: tool-permissions-shell-execution-block
    condition:
      field: action
      operator: in
      value: ["shell_exec", "execute_code", "run_script", "eval_code", "system_call", "bash", "cmd"]
    action: deny
    priority: 100
    message: "OWASP LLM08: Shell/code execution tool blocked — add to tool_allowlist to enable"

  # =========================================================================
  # OWASP LLM08 — Destructive Data Operations
  # Irreversible data deletion tools require human approval.
  # =========================================================================

  - name: tool-permissions-destructive-data-block
    condition:
      field: action
      operator: in
      value: ["delete_record", "drop_table", "purge_data", "wipe_database", "truncate_table", "hard_delete"]
    action: deny
    priority: 100
    message: "OWASP LLM08: Destructive data operation blocked — requires human approval"

  # =========================================================================
  # OWASP LLM08 — Privilege Escalation
  # Agents must not be able to modify their own permissions or grant
  # elevated access to other identities.
  # =========================================================================

  - name: tool-permissions-privilege-escalation-block
    condition:
      field: action
      operator: in
      value: ["grant_admin", "add_permission", "modify_role", "elevate_privilege", "sudo", "change_acl"]
    action: deny
    priority: 100
    message: "OWASP LLM08: Privilege escalation blocked — agent cannot modify permissions"

  # =========================================================================
  # OWASP LLM08 — Deployment & Release
  # Production deployments require human sign-off regardless of
  # automated pipeline status.
  # =========================================================================

  - name: tool-permissions-deployment-escalate
    condition:
      field: action
      operator: in
      value: ["deploy", "push_to_production", "release", "publish_package", "rollout"]
    action: block
    priority: 90
    message: "OWASP LLM08: Deployment action requires human approval before execution"

  # =========================================================================
  # OWASP LLM08 — Outbound Network / Exfiltration Risk
  # Outbound calls to external endpoints can be used for data exfiltration.
  # Escalate for review before allowing.
  # =========================================================================

  - name: tool-permissions-outbound-network-escalate
    condition:
      field: action
      operator: in
      value: ["send_http_request", "webhook_call", "external_api_post", "email_send", "sms_send", "ftp_upload"]
    action: block
    priority: 85
    message: "OWASP LLM08: Outbound network action escalated — verify intended destination before execution"

defaults:
  action: allow
  max_tool_calls: 10
