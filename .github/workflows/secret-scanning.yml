name: Secret Scanning

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'agent-governance-python/notebooks/**'
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Gitleaks requires the `GITLEAKS_LICENSE` secret to run with its
      # full ruleset. Secrets are not exposed to workflows triggered by
      # fork PRs, so the step is skipped cleanly in that case (the
      # upstream maintainer will see the run on the rebased branch or
      # on the post-merge push event). For every other trigger
      # (in-tree PR, push to main, schedule, manual dispatch) the step
      # MUST succeed — the previous `continue-on-error: true` made a
      # licensed-but-failing scan indistinguishable from a successful
      # one, undermining the gate the workflow is supposed to provide.
      - name: Run Gitleaks
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Scan for high-entropy strings
        run: |
          echo "=== Scanning for potential secrets ==="
          FOUND=0

          # Check for hardcoded API keys/tokens (common patterns)
          PATTERNS=(
            '[A-Za-z0-9_-]{32,}==$'
            'sk-[A-Za-z0-9]{48}'
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
            'xox[bsrp]-[A-Za-z0-9-]{10,}'
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include='*.py' --include='*.ts' --include='*.js' \
              --include='*.yaml' --include='*.yml' --include='*.json' \
              --include='*.env*' --include='*.cfg' --include='*.ini' \
              -E "$pattern" . \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
              --exclude-dir=__pycache__ --exclude='*.lock' --exclude='package-lock.json' \
              2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential secrets found matching pattern: $pattern"
              echo "$MATCHES" | head -5 | sed 's/:.*/:***REDACTED***/'
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Review the above matches for potential secret exposure"
          else
            echo "OK: No high-entropy strings matching known secret patterns"
          fi
