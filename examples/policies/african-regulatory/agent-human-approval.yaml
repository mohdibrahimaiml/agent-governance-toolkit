# agt-policies — African Regulatory Pack
# AI Agent Human Approval (HITL) Controls — Universal Safety Control
#
# Regulatory alignment:
#   OWASP Agentic AI Top 10    — LLM09 (Overreliance / Human Oversight)
#   NIST AI RMF                — GOVERN 5.1, MANAGE 4.1
#   CBN Circulars              — Maker-Checker requirement for financial ops
#   EU AI Act Art. 14          — human oversight for high-risk AI systems
#
# ⚠️  IMPORTANT: This is a community-maintained governance starter policy.
# Human approval thresholds (amounts, bulk counts) must be calibrated
# to your organisation's risk appetite and regulatory requirements.
#
# Rego reference implementation: rego/agent-human-approval.rego
# The .rego file is NOT loaded by the Agent-OS Python runtime.

version: "1.0"
name: agent-human-approval
description: >
  Universal agent safety control — ensures human-in-the-loop approval before
  agents execute irreversible, high-value, or bulk operations. Covers account
  lifecycle actions, financial transfers, bulk operations, and attempts to
  bypass the approval gate. Deployer-configurable via Rego data.config.human_approval.*.

metadata:
  source_regulation: "OWASP Agentic AI Top 10 — LLM09 (Human Oversight); CBN Maker-Checker Requirements; NIST AI RMF GOVERN 5.1"
  jurisdiction: "universal"
  enforcing_authority: "OWASP Agentic AI Working Group"

rules:

  # =========================================================================
  # OWASP LLM09 — Irreversible Account Actions
  # Account deletion, closure, freezing, and blacklisting cannot be
  # undone without manual intervention. Human approval required.
  # =========================================================================

  - name: human-approval-irreversible-account-action
    condition:
      field: action
      operator: in
      value: ["delete_account", "close_account", "blacklist_customer", "freeze_account", "terminate_service", "suspend_user"]
    action: block
    priority: 100
    message: "OWASP LLM09: Irreversible account action requires human approval before execution"

  # =========================================================================
  # OWASP LLM09 / CBN Maker-Checker — Financial Transfers
  # AI agents must never initiate AND execute financial transfers without
  # a human checker in the loop (CBN maker-checker requirement).
  # =========================================================================

  - name: human-approval-financial-transfer
    condition:
      field: action
      operator: matches
      value: "^(transfer_funds|send_money|initiate_payment|execute_wire|process_withdrawal|disburse_funds)$"
    action: block
    priority: 95
    message: "OWASP LLM09 / CBN Maker-Checker: Financial transfer requires human approval — agent cannot self-execute"

  # =========================================================================
  # OWASP LLM09 — Bulk / Mass Operations
  # Operations affecting many records at once have large blast radius.
  # Always require human review regardless of individual record sensitivity.
  # =========================================================================

  - name: human-approval-bulk-operation
    condition:
      field: action
      operator: matches
      value: "^(bulk_|mass_|batch_|all_users_|all_customers_|full_table_).*"
    action: block
    priority: 90
    message: "OWASP LLM09: Bulk operation requires human approval — scope and impact must be verified"

  # =========================================================================
  # OWASP LLM09 — Approval Gate Bypass Attempt
  # Agents that suggest skipping the approval process are attempting
  # to circumvent governance controls. Hard block.
  # =========================================================================

  - name: human-approval-bypass-attempt
    condition:
      field: output
      operator: matches
      value: "(?i)(skip\\s+(approval|review|check)|proceed\\s+without\\s+(approval|review)|auto.?approv|bypass\\s+(compliance|policy|governance|approval))"
    action: deny
    priority: 100
    message: "OWASP LLM09: Agent cannot suggest bypassing the human approval requirement — blocked"

defaults:
  action: allow
  max_tokens: 4096
  max_tool_calls: 10
