# agt-policies — African Regulatory Pack
# AI Agent Prompt Injection Controls — Universal Safety Control
#
# Regulatory alignment:
#   OWASP Agentic AI Top 10    — LLM01 / ASI01 (Prompt Injection)
#   NIST AI RMF                — GOVERN 6.1, MANAGE 2.2
#   EU AI Act Art. 15          — robustness and cybersecurity for high-risk AI
#
# ⚠️  IMPORTANT: This is a community-maintained governance starter policy.
# It is NOT a certified legal compliance instrument. Organisations must
# perform their own compliance assessments before deploying in regulated
# environments.
#
# Rego reference implementation: rego/agent-prompt-injection.rego
# The .rego file is NOT loaded by the Agent-OS Python runtime.

version: "1.0"
name: agent-prompt-injection
description: >
  Universal agent safety control — detects and blocks prompt injection attacks
  targeting AI agents. Covers direct instruction overrides, jailbreak patterns,
  role-play abuse, and structural delimiter injections (OWASP LLM01 / ASI01).
  Deployer-configurable pattern sets via Rego data.config.prompt_injection.*.

metadata:
  source_regulation: "OWASP Agentic AI Top 10 — LLM01 / ASI01 (Prompt Injection); NIST AI RMF GOVERN 6.1"
  jurisdiction: "universal"
  enforcing_authority: "OWASP Agentic AI Working Group"

rules:

  # =========================================================================
  # OWASP LLM01 — Direct Instruction Override
  # Phrases that attempt to override the agent's system prompt or prior
  # instructions. These are the most common injection vectors.
  # =========================================================================

  - name: prompt-injection-direct-override
    condition:
      field: input
      operator: matches
      value: "(?i)(ignore\\s+(all\\s+)?previous\\s+instructions|you\\s+are\\s+now\\b|forget\\s+(everything|all|your)\\b|disregard\\s+(all\\s+)?(above|prior|previous)\\b|override\\s+(previous\\s+)?instructions|do\\s+not\\s+follow\\s+(your|the)\\s+(previous\\s+)?instructions)"
    action: deny
    priority: 100
    message: "OWASP LLM01: Direct instruction override injection detected — blocked"

  # =========================================================================
  # OWASP LLM01 — Jailbreak & Restriction Bypass
  # Attempts to remove safety filters or make the agent operate without
  # its governance constraints.
  # =========================================================================

  - name: prompt-injection-jailbreak
    condition:
      field: input
      operator: matches
      value: "(?i)(\\bjailbreak\\b|\\bDAN\\s+mode\\b|developer\\s+mode\\s+override|bypass\\s+(all\\s+)?(safety|content)\\s+(filters?|restrictions?)|you\\s+have\\s+no\\s+(limitations?|restrictions?|rules?))"
    action: deny
    priority: 100
    message: "OWASP LLM01: Jailbreak / restriction-bypass injection detected — blocked"

  # =========================================================================
  # OWASP LLM01 — Role-Play & Context Manipulation
  # Attempts to change the agent's identity or reveal/replace the system prompt.
  # =========================================================================

  - name: prompt-injection-role-play-abuse
    condition:
      field: input
      operator: matches
      value: "(?i)(pretend\\s+you\\s+are|act\\s+as\\s+if\\s+you\\s+have\\s+no\\s+restrictions|your\\s+true\\s+purpose\\s+is|the\\s+real\\s+system\\s+prompt\\s+is|actually\\s+your\\s+real\\s+instructions)"
    action: deny
    priority: 100
    message: "OWASP LLM01: Role-play / context manipulation injection detected — blocked"

  # =========================================================================
  # OWASP LLM01 — Structural Delimiter Injection
  # Tokens that attempt to escape the user turn and inject into the system
  # or assistant turn in models with explicit turn delimiters.
  # =========================================================================

  - name: prompt-injection-structural-delimiter
    condition:
      field: input
      operator: matches
      value: "(\\[INST\\]|<<SYS>>|<\\|system\\|>|<\\|im_start\\||###\\s*System|END\\s+SYSTEM|BEGIN\\s+USER|<\\|assistant\\|>|<\\|user\\|>)"
    action: block
    priority: 85
    message: "OWASP LLM01: Structural injection delimiter detected — escalated for human review"

defaults:
  action: allow
  max_tokens: 4096
  max_tool_calls: 10
